---
id: SSRF-012
description: "Internal IP in URL parameter (10.x.x.x)"
severity: high
target: ARGS
pattern: "(?i)(https?://|//)10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}"
action: BLOCK

---
id: SSRF-013
description: "Internal IP in URL parameter (172.16-31.x.x)"
severity: high
target: ARGS
pattern: "(?i)(https?://|//)172\\.(1[6-9]|2[0-9]|3[01])\\.\\d{1,3}\\.\\d{1,3}"
action: BLOCK

---
id: SSRF-014
description: "Internal IP in URL parameter (192.168.x.x)"
severity: high
target: ARGS
pattern: "(?i)(https?://|//)192\\.168\\.\\d{1,3}\\.\\d{1,3}"
action: BLOCK

---
id: SSRF-015
description: "Internal IP in body (10.x.x.x)"
severity: high
target: BODY
pattern: "(?i)(https?://|//)10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}"
action: BLOCK

---
id: SSRF-016
description: "Internal IP in body (192.168.x.x)"
severity: high
target: BODY
pattern: "(?i)(https?://|//)192\\.168\\.\\d{1,3}\\.\\d{1,3}"
action: BLOCK

---
id: SSRF-017
description: "URL with decimal-encoded IP (2130706433 = 127.0.0.1)"
severity: critical
target: ARGS
pattern: "(?i)(https?://|//)2130706433"
action: BLOCK

---
id: SSRF-018
description: "URL with hex-encoded IP (0x7f000001 = 127.0.0.1)"
severity: critical
target: ARGS
pattern: "(?i)(https?://|//)0x7f000001"
action: BLOCK

---
id: SSRF-019
description: "SSRF via headers (X-Forwarded-For, Referer)"
severity: high
target: HEADERS
pattern: "(?i)(X-Forwarded-Host|Referer):.*(127\\.0\\.0\\.1|169\\.254\\.169\\.254|10\\.|192\\.168\\.|172\\.(1[6-9]|2[0-9]|3[01])\\.)"
action: BLOCK

