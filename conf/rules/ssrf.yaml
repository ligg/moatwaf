# Server-Side Request Forgery (SSRF) Detection Rules
# Covers: localhost references, cloud metadata endpoints, internal IP ranges,
#         dangerous URI schemes, DNS rebinding indicators

---
id: SSRF-001
description: "Localhost reference in URL parameter"
severity: critical
target: ARGS
pattern: "(?i)(https?://|//)(127\\.0\\.0\\.1|localhost|0\\.0\\.0\\.0|\\[::1\\])"
action: BLOCK

---
id: SSRF-002
description: "Localhost in request body"
severity: critical
target: BODY
pattern: "(?i)(https?://|//)(127\\.0\\.0\\.1|localhost|0\\.0\\.0\\.0|\\[::1\\])"
action: BLOCK

---
id: SSRF-003
description: "AWS metadata endpoint"
severity: critical
target: ARGS
pattern: "(?i)(https?://|//)169\\.254\\.169\\.254"
action: BLOCK

---
id: SSRF-004
description: "AWS metadata in body"
severity: critical
target: BODY
pattern: "(?i)(https?://|//)169\\.254\\.169\\.254"
action: BLOCK

---
id: SSRF-005
description: "GCP metadata endpoint"
