# Scanner and Automated Tool Detection Rules
# Covers: vulnerability scanners, penetration testing tools,
#         crawling tools, brute-force tools

---
id: SCAN-001
description: "sqlmap SQL injection tool"
severity: high
target: HEADERS
pattern: "(?i)sqlmap"
action: BLOCK

