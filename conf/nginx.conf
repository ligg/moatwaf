# conf/nginx.conf
worker_processes auto;
error_log logs/error.log info;
pid logs/nginx.pid;

# Pass environment variables to worker processes (nginx clears them by default)
env WAF_ADMIN_PATH;
env WAF_HEALTH_PATH;
env WAF_ADMIN_TOKEN;
env WAF_BACKEND;
env WAF_MAX_UPLOAD_SIZE;
env WAF_LOG_DIR;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Security hardening
    server_tokens off;

    # Security response headers (applied to all responses)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Request limits
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    client_max_body_size ${WAF_MAX_UPLOAD_SIZE};
    large_client_header_buffers 4 8k;

    # Timeouts
    client_body_timeout 10;
    client_header_timeout 10;
    keepalive_timeout 15;
    send_timeout 10;

    # Rate limiting at nginx level (before Lua)
    limit_req_zone $binary_remote_addr zone=flood:10m rate=100r/s;

    # Shared dictionaries for WAF state
    lua_shared_dict ip_blacklist 10m;
    lua_shared_dict ip_whitelist 5m;
    lua_shared_dict rate_limit 50m;
    lua_shared_dict block_rules 20m;
    lua_shared_dict session_track 30m;
    lua_shared_dict upload_cache 10m;
    lua_shared_dict waf_stats 5m;
    lua_shared_dict waf_state 1m;
    lua_shared_dict waf_logs 10m;

    # Lua module path
    lua_package_path "lib/?.lua;;";

    # Preload modules at startup
    init_by_lua_block {
        require("lib.init")

        -- Validate admin API token is configured with sufficient entropy
        local admin_token = os.getenv("WAF_ADMIN_TOKEN") or ""
        if #admin_token < 32 then
            ngx.log(ngx.ERR, "CRITICAL: WAF_ADMIN_TOKEN must be at least 32 characters. Admin API is DISABLED.")
            -- Set a flag so admin.lua can reject all requests
            ngx.shared.waf_state:set("admin_token_valid", false)
        else
            ngx.shared.waf_state:set("admin_token_valid", true)
        end

        -- Store token in shared dict so admin.lua can read it
        ngx.shared.waf_state:set("waf_admin_token", admin_token)

        -- Initialize WAF mode: "block" (default) or "log_only"
        if not ngx.shared.waf_state:get("waf_mode") then
            ngx.shared.waf_state:set("waf_mode", "block")
        end
    }

    # Log format with WAF fields
    log_format waf '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   'rt=$request_time '
                   'waf_action=$waf_action waf_rule=$waf_rule';

    # Upstream: ELB backend
    upstream backend {
        server 127.0.0.1:80;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # WAF variables (set by Lua at runtime, declared here for log_format)
        set $waf_action "";
        set $waf_rule "";
        set $waf_allowed_hosts "localhost,example.com";
        set $waf_admin_token "";

        # Deny HTTP/1.0 and requests without Host
        if ($http_host = "") {
            return 400;
        }

        access_log logs/access.log waf;

        # Admin UI: bind to internal network only
        location ${WAF_ADMIN_PATH} {
            # Restrict to internal network
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;

            # Allow inline scripts/styles for admin panel (overrides server-level CSP)
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'" always;

            content_by_lua_block {
                local admin = require("lib.admin")
                admin.handle()
            }
        }

        # Static assets for admin panel (fonts, JS libraries)
        location /__waf_static__/ {
            alias /opt/moat/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Favicon
        location = /favicon.ico {
            alias /opt/moat/static/favicon.svg;
            default_type image/svg+xml;
            access_log off;
            expires 7d;
        }

        # Health check endpoint for ELB
        location ${WAF_HEALTH_PATH} {
            access_log off;
            default_type text/plain;
            return 200 "OK";
        }

        # Main WAF processing
        location / {
            # Nginx-level rate limit as first defense
            limit_req zone=flood burst=50 nodelay;

            # WAF rewrite phase: IP control + rule engine
            rewrite_by_lua_block {
                local waf = require("lib.waf")
                waf.rewrite_phase()
            }

            # WAF access phase: CC protection + upload check
            access_by_lua_block {
                local waf = require("lib.waf")
                waf.access_phase()
            }

            # Proxy to backend
            proxy_pass http://backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization "Bearer apk_f7e7a5a316f4d59d7b4d567ce72f12d8a622c7694e4418a1";

            # HTTP/1.1 only
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Body filter for upload detection
            body_filter_by_lua_block {
                local waf = require("lib.waf")
                waf.body_filter_phase()
            }

            # Log phase
            log_by_lua_block {
                local waf = require("lib.waf")
                waf.log_phase()
            }
        }
    }
}
