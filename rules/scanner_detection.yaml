---
id: SCAN_015
description: "Scanner - Generic scanner User-Agent"
target: HEADERS
pattern: "(?i)(scanner|vulnerability|exploit|penetration|hack)"
action: block
severity: high
---
id: SCAN_016
description: "Scanner - Missing or empty User-Agent"
target: HEADERS
pattern: "^$"
action: log
severity: medium
---
id: SCAN_017
description: "Scanner - Go http client (automated)"
target: HEADERS
pattern: "(?i)^go-http-client"
action: log
severity: low
---
id: SCAN_018
description: "Scanner - Python requests (automated)"
target: HEADERS
