# Scanner and Bot Detection Rules
# Detects vulnerability scanners, directory brute-forcers, and known attack tools

---
id: SCAN_001
description: "Scanner - Nikto"
target: HEADERS
pattern: "(?i)nikto"
action: block
severity: high
---
id: SCAN_002
description: "Scanner - SQLMap"
target: HEADERS
pattern: "(?i)sqlmap"
action: block
severity: high
---
id: SCAN_003
description: "Scanner - Nmap/NSE"
target: HEADERS
pattern: "(?i)(nmap|nse)"
action: block
severity: high
---
id: SCAN_004
description: "Scanner - DirBuster/Dirbuster"
target: HEADERS
pattern: "(?i)dirbuster"
action: block
severity: high
