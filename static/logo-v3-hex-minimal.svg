      <stop offset="0%" style="stop-color:#8a2be2"/>
      <stop offset="100%" style="stop-color:#00b4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="260" height="80" fill="#0d0221"/>
  <!-- Hex icon -->
  <g transform="translate(10,8)" filter="url(#glow)">
    <polygon points="32,2 58,18 58,50 32,66 6,50 6,18" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M16 50 L16 22 L24 22 L32 38 L40 22 L48 22 L48 50" fill="none" stroke="url(#g)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="6" cy="18" r="2" fill="#00b4ff" opacity="0.5"/>
    <circle cx="58" cy="18" r="2" fill="#8a2be2" opacity="0.5"/>
    <circle cx="6" cy="50" r="2" fill="#8a2be2" opacity="0.5"/>
    <circle cx="58" cy="50" r="2" fill="#00b4ff" opacity="0.5"/>
    <line x1="0" y1="18" x2="5" y2="18" stroke="#00b4ff" stroke-width="1" opacity="0.3"/>
    <line x1="59" y1="18" x2="64" y2="18" stroke="#8a2be2" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="50" x2="5" y2="50" stroke="#8a2be2" stroke-width="1" opacity="0.3"/>
    <line x1="59" y1="50" x2="64" y2="50" stroke="#00b4ff" stroke-width="1" opacity="0.3"/>
  </g>
